<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#6e0a12",
                        "surface-container-highest": "#dce4e8",
                        "primary-container": "#6cb4f1",
                        "primary-dim": "#005787",
                        "on-tertiary-container": "#414068",
                        "tertiary-container": "#cac7f8",
                        "on-surface-variant": "#596064",
                        "on-background": "#2c3437",
                        "on-primary-fixed": "#001627",
                        "on-primary": "#f6f9ff",
                        "primary": "#00649a",
                        "surface": "#f7f9fb",
                        "surface-variant": "#dce4e8",
                        "surface-tint": "#00649a",
                        "surface-container-high": "#e3e9ed",
                        "tertiary": "#5c5b85",
                        "on-tertiary-fixed-variant": "#4a4971",
                        "error": "#a83836",
                        "error-dim": "#67040d",
                        "inverse-on-surface": "#9a9d9f",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#2c3437",
                        "secondary-dim": "#465564",
                        "primary-fixed": "#6cb4f1",
                        "on-error": "#fff7f6",
                        "secondary-fixed-dim": "#c6d6e8",
                        "tertiary-fixed-dim": "#bcbae9",
                        "on-secondary-container": "#445362",
                        "on-primary-fixed-variant": "#003a5d",
                        "secondary": "#526170",
                        "on-primary-container": "#00314f",
                        "tertiary-dim": "#504f78",
                        "inverse-primary": "#6cb4f1",
                        "on-secondary-fixed": "#32414f",
                        "surface-container": "#eaeff2",
                        "surface-container-low": "#f0f4f7",
                        "on-secondary": "#f6f9ff",
                        "on-tertiary": "#fbf7ff",
                        "surface-dim": "#d4dbdf",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed-variant": "#4e5d6c",
                        "secondary-fixed": "#d4e4f6",
                        "outline": "#747c80",
                        "error-container": "#fa746f",
                        "on-tertiary-fixed": "#2d2c53",
                        "tertiary-fixed": "#cac7f8",
                        "background": "#f7f9fb",
                        "secondary-container": "#d4e4f6",
                        "inverse-surface": "#0b0f10",
                        "primary-fixed-dim": "#5ea7e2",
                        "outline-variant": "#acb3b7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hero-gradient {
            background: linear-gradient(180deg, #00649a 0%, #005787 100%);
        }

        .playful {
            font-family: 'Comic Neue', cursive;
            display: inline-block;
            transform: rotate(-3deg) translateY(-2px);
        }
        
    </style>
</head>

<body
    class="bg-surface font-body text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
    
    <!-- Main Content Canvas -->
    <main class="flex-grow flex items-center justify-center bg-surface-container-low px-4 sm:px-6 lg:px-8">
        <!-- The Hero Card (Nested Layering) -->
        <div
            class="w-full max-auto max-w-[480px] bg-surface-container-lowest rounded-xl p-[4rem_3rem_5rem_3rem] shadow-[0px_12px_32px_rgba(44,52,55,0.06)]">
            <!-- Headline Section -->
            <div class="mb-10 text-center">
                <h1
                    class="font-headline text-[2rem] font-extrabold text-on-surface tracking-[-0.02em] mb-2 leading-tight ">
                    While AI thinks

                </h1>
                <p class="font-body text-sm text-on-surface-variant font-medium">
                   <span class="playful"><strong>Mess around with words</strong></span>
                </p>
            </div>
            <!-- Form Content -->
            <form class="space-y-6">
                <!-- Username/Email Field -->
                <div class="space-y-2">
                    <label
                        class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant opacity-80"
                        for="email">
                        Username or Email
                    </label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface font-body text-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 transition-all duration-200 outline-none"
                            id="email" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label
                            class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant opacity-80"
                            for="password">
                            Password
                        </label>
                        <a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">
                            Forgot Password?
                        </a>
                    </div>
                    <div class="relative group">
                        <input
                            class="w-full bg-surface-container-high border-none rounded-lg px-5 py-4 text-on-surface font-body text-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 transition-all duration-200 outline-none"
                            id="password" placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-50 hover:opacity-100 transition-opacity"
                            id="password-toggle" type="button">
                            <span class="material-symbols-outlined" data-icon="visibility"
                                id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="pt-4">
                    <button
                        class="w-full hero-gradient text-on-primary font-headline text-base font-bold py-4 rounded-full shadow-[0px_12px_32px_rgba(0,100,154,0.15)] hover:shadow-[0px_8px_24px_rgba(0,100,154,0.25)] transition-all active:scale-[0.98]"
                        type="submit">
                        Login
                    </button>
                </div>
            </form>
            <!-- Bottom Registration Link -->
            <div class="mt-8 text-center">
                <p class="text-sm font-body text-on-surface-variant">
                    Don't have an account?
                    <a class="font-bold text-primary hover:text-primary-dim underline decoration-primary/30 underline-offset-4 transition-all"
                        href="#">
                        Sign Up
                    </a>
                </p>
            </div>
        </div>
    </main>
</body>
<script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('password-toggle');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';

        // Toggle input type
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

        // Animate icon change (simple fade)
        eyeIcon.style.opacity = '0';

        setTimeout(() => {
            // Toggle Material Symbol icon
            eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
            eyeIcon.style.opacity = '1';
        }, 100);
    });
</script>
<style>
    #eye-icon {
        transition: opacity 0.15s ease-in-out;
    }
</style>


</html>
